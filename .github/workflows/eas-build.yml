name: EAS Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install deps
        run: npm install

      - name: Build APK
        env:
          EXPO_PUBLIC_DOMAIN: bdc6126a-17d2-41b4-8100-c7f6cfadcd7a-00-2atgmnii1colv.riker.replit.dev
          EXPO_PUBLIC_API_BASE: https://bdc6126a-17d2-41b4-8100-c7f6cfadcd7a-00-2atgmnii1colv.riker.replit.dev
        run: eas build -p android --profile preview --non-interactive
